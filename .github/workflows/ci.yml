name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # POC 子目录测试（独立环境）
  test-poc:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install POC dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r poc/requirements.txt
    - name: Run POC tests
      run: |
        cd poc
        python -m pytest tests/ -v --tb=short
    - name: Run POC demo
      run: |
        cd poc
        python demo_stages.py

  # 根项目：Dashboard / Studio 冒烟（业务主链路）
  root-app:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install runtime + dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
    - name: Install FFmpeg（成片/doctor 自检必需）
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends ffmpeg
    - name: Preflight (doctor)
      run: python main.py doctor
    - name: Dashboard e2e + Studio DB
      run: |
        python -m pytest tests/e2e/test_dashboard_e2e.py tests/integration/test_studio_db.py -q --tb=short

  # Playwright：首页向导 UI 冒烟（不跑真渲染）
  ui-browser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install runtime + dev + Playwright
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt -r requirements-e2e-ui.txt
    - name: Install Chromium
      env:
        DEBIAN_FRONTEND: noninteractive
      run: python -m playwright install chromium --with-deps
    - name: Wizard UI smoke (no VIDEO_UI_E2E)
      run: |
        python -m pytest tests/browser/test_dashboard_ui_walkthrough.py -m browser -q --tb=short

  # 构建并验证 Docker 镜像
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-poc, root-app, ui-browser]
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t pythonproject1:${{ github.sha }} .
    - name: Test Docker image — doctor 探活
      run: |
        docker run --rm pythonproject1:${{ github.sha }} python main.py doctor

  # 发布（仅 main 分支）
  release:
    runs-on: ubuntu-latest
    needs: [test-poc, root-app, ui-browser, build-docker]
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v3
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        draft: false
        prerelease: false
