[pytest]
testpaths = tests
markers =
    unit: 单元测试（单一模块，纯函数）
    integration: 集成测试（多模块协作、DB、HTTP）
    browser: Playwright 浏览器 UI（需 playwright + chromium）
    video_ui_e2e: 首页向导真渲染全链路（需 VIDEO_UI_E2E=1、ffmpeg、耗时）
    video_e2e: 视频渲染端到端（需 ffmpeg、耗时）
    slow: 慢速测试
    agent_uat: 真实 LLM 调用（需 UAT_AGENT_COMPILE=1 与密钥）
